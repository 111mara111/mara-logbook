<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MARA PILOT LOGBOOK</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0b1a33">

<style>
:root{
--bg:#071326;
--panel:rgba(10,24,50,.85);
--ink:#eaf0ff;
--muted:rgba(234,240,255,.6);
--line:rgba(255,255,255,.08);
--gold:#d9bb62;
--danger:#d06b5f;
--ok:#59c18d;
}
body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui}
*{box-sizing:border-box}
.app{max-width:1500px;margin:auto;padding:20px}
button{cursor:pointer;text-transform:uppercase;font-weight:900}

.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.title{font-weight:1000;letter-spacing:3px}
.actions button{margin-left:8px}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:14px}
.panel-h{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}
.panel-b{padding:12px}

table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:11px}
th,td{border:1px solid var(--line);padding:6px;text-align:center}
thead th{background:rgba(255,255,255,.05);font-size:10px;letter-spacing:1px}
input{width:100%;background:transparent;border:none;color:var(--ink);text-align:center;font-weight:900;text-transform:uppercase}
input:focus{background:rgba(217,187,98,.15)}

tfoot td{font-weight:1000;color:var(--gold)}
.total-label{text-align:left;padding-left:10px}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--panel);padding:20px;border-radius:12px;width:600px;max-width:95%}
.modal h3{margin-top:0}
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}
.modal-actions{text-align:right;margin-top:14px}
</style>
</head>

<body>
<div class="app">

<div class="topbar">
<div class="title">MARA PILOT LOGBOOK</div>
<div class="actions">
<button onclick="setPage(currentPage-1)">◀</button>
<button id="pageLabel">PAGE 1</button>
<button onclick="setPage(currentPage+1)">▶</button>
<button onclick="openModal()">+ ADD FLIGHT</button>
</div>
</div>

<div class="panel">
<div class="panel-h">
<div>LOGBOOK PAGE (10 ROWS)</div>
<div>AUTO SAVED</div>
</div>
<div class="panel-b">
<table>
<thead>
<tr>
<th>DATE</th>
<th>DEP</th>
<th>OUT</th>
<th>ARR</th>
<th>IN</th>
<th>TYPE</th>
<th>REG</th>
<th>NAME</th>
<th>TOTAL</th>
<th>DAY LDG</th>
<th>NIGHT LDG</th>
<th>NIGHT</th>
<th>IFR</th>
<th>PIC</th>
<th>REMARKS</th>
<th></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
<tfoot id="tfoot"></tfoot>
</table>
</div>
</div>

</div>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
<div class="modal" onclick="event.stopPropagation()">
<h3>NEW FLIGHT ENTRY</h3>

<div class="field"><label>DATE</label><input id="f_date"></div>
<div class="field"><label>DEP</label><input id="f_dep"></div>
<div class="field"><label>ARR</label><input id="f_arr"></div>
<div class="field"><label>TYPE</label><input id="f_type"></div>
<div class="field"><label>REG</label><input id="f_reg"></div>
<div class="field"><label>TOTAL (H:MM)</label><input id="f_total"></div>
<div class="field"><label>PIC (H:MM)</label><input id="f_pic"></div>
<div class="field"><label>IFR (H:MM)</label><input id="f_ifr"></div>
<div class="field"><label>REMARKS</label><input id="f_rem"></div>

<div class="modal-actions">
<button onclick="closeModal()">CANCEL</button>
<button onclick="saveFromModal()">SAVE</button>
</div>

</div>
</div>

<script>
  /* =========================
   STATE & STORAGE
========================= */
const ROWS_PER_PAGE = 10;
const KEY = "mara_logbook_v10";

let currentPage = 1;
let flights = loadData();

function loadData(){
  try{
    return JSON.parse(localStorage.getItem(KEY)) || [];
  }catch(e){
    return [];
  }
}
function saveData(){
  localStorage.setItem(KEY, JSON.stringify(flights));
}

/* =========================
   PAGE CONTROL
========================= */
function setPage(p){
  if(p < 1) return;
  const max = Math.max(1, Math.ceil(flights.length / ROWS_PER_PAGE));
  if(p > max) return;
  currentPage = p;
  render();
}

/* =========================
   MODAL CONTROL
========================= */
function openModal(){
  clearModal();
  document.getElementById("overlay").classList.add("open");
}
function closeModal(){
  document.getElementById("overlay").classList.remove("open");
}
function overlayClick(e){
  if(e.target.id === "overlay") closeModal();
}
function clearModal(){
  ["f_date","f_dep","f_arr","f_type","f_reg","f_total","f_pic","f_ifr","f_rem"]
  .forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.value="";
  });
}

/* =========================
   SAVE FROM MODAL
========================= */
function saveFromModal(){

  const get = id => (document.getElementById(id).value || "").toUpperCase().trim();

  const hasCore = get("f_date") || get("f_dep") || get("f_arr");
  if(!hasCore){
    alert("ENTER DATE OR DEP/ARR");
    return;
  }

  const start = (currentPage-1)*ROWS_PER_PAGE;
  const end = start+ROWS_PER_PAGE;

  if(flights.length < end){
    for(let i=flights.length;i<end;i++) flights.push(null);
  }

  let placed=false;
  for(let i=start;i<end;i++){
    if(!flights[i]){
      flights[i]={
        date:get("f_date"),
        dep:get("f_dep"),
        arr:get("f_arr"),
        type:get("f_type"),
        reg:get("f_reg"),
        total:get("f_total"),
        pic:get("f_pic"),
        ifr:get("f_ifr"),
        remarks:get("f_rem"),
        ldgDay:"0",
        ldgNight:"0",
        night:""
      };
      placed=true;
      break;
    }
  }

  if(!placed){
    alert("PAGE FULL");
    return;
  }

  saveData();
  closeModal();
  render();
}

/* =========================
   TABLE EDIT LOGIC
========================= */

function ensureRow(i){
  if(!flights[i]){
    flights[i]={
      date:"",
      dep:"",
      arr:"",
      type:"",
      reg:"",
      total:"",
      pic:"",
      ifr:"",
      remarks:"",
      ldgDay:"0",
      ldgNight:"0",
      night:""
    };
  }
}

function onCell(i,key,value){

  const createKeys=["date","dep","arr"];

  if(!flights[i] && !createKeys.includes(key)){
    return; // ignore until row exists
  }

  if(!flights[i] && createKeys.includes(key)){
    ensureRow(i);
  }

  flights[i][key]=value.toUpperCase();
  saveData();
  render();
}

function clearRow(i){
  flights[i]=null;
  saveData();
  render();
}

/* =========================
   RENDER
========================= */
function render(){

  const tbody=document.getElementById("tbody");
  tbody.innerHTML="";

  const start=(currentPage-1)*ROWS_PER_PAGE;
  const end=start+ROWS_PER_PAGE;

  if(flights.length < end){
    for(let i=flights.length;i<end;i++) flights.push(null);
  }

  let totalMin=0;
  let picMin=0;
  let ifrMin=0;

  for(let r=0;r<ROWS_PER_PAGE;r++){
    const idx=start+r;
    const f=flights[idx];

    const tr=document.createElement("tr");

    function cell(key){
      const val=f?f[key]:"";
      return `<td><input value="${val||""}" 
        oninput="onCell(${idx},'${key}',this.value)"></td>`;
    }

    tr.innerHTML=
      cell("date")+
      cell("dep")+
      "<td></td>"+
      cell("arr")+
      "<td></td>"+
      cell("type")+
      cell("reg")+
      "<td>SELF</td>"+
      cell("total")+
      "<td>0</td>"+
      "<td>0</td>"+
      "<td></td>"+
      cell("ifr")+
      cell("pic")+
      cell("remarks")+
      `<td>${f?'<button onclick="clearRow('+idx+')">×</button>':""}</td>`;

    tbody.appendChild(tr);

    if(f){
      totalMin+=toMinutes(f.total);
      picMin+=toMinutes(f.pic);
      ifrMin+=toMinutes(f.ifr);
    }
  }

  document.getElementById("tfoot").innerHTML=
    `<tr>
      <td colspan="8" class="total-label">TOTAL FROM THIS PAGE</td>
      <td>${formatMin(totalMin)}</td>
      <td></td><td></td><td></td>
      <td>${formatMin(ifrMin)}</td>
      <td>${formatMin(picMin)}</td>
      <td colspan="2"></td>
    </tr>`;

  const maxPage=Math.max(1,Math.ceil(flights.length/ROWS_PER_PAGE));
  document.getElementById("pageLabel").innerText=
    "PAGE "+currentPage+" / "+maxPage;
}

/* =========================
   TIME HELPERS
========================= */
function toMinutes(v){
  if(!v || !v.includes(":")) return 0;
  const p=v.split(":");
  return parseInt(p[0])*60+parseInt(p[1]);
}
function formatMin(m){
  if(!m) return "0:00";
  const h=Math.floor(m/60);
  const mm=m%60;
  return h+":"+(mm<10?"0":"")+mm;
}

/* INIT */
render();
</script>
</body>
</html>
